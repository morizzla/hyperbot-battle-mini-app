<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Battle Royale Arena</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

    :root {
      color-scheme: dark;
      --bg: #08111f;
      --bg-2: #0f1e35;
      --panel: rgba(9, 19, 38, 0.84);
      --panel-strong: rgba(13, 26, 48, 0.96);
      --border: rgba(112, 177, 255, 0.24);
      --text: #ecf4ff;
      --muted: #9db4d0;
      --good: #4ce1a1;
      --bad: #ff6d7a;
      --warm: #ffd166;
      --cool: #6fc6ff;
      --violet: #8cb0ff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font-display: "Bebas Neue", "Arial Black", sans-serif;
      --font-body: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(79, 152, 255, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 109, 122, 0.16), transparent 26%),
        linear-gradient(180deg, #040812 0%, #071120 38%, #0a1425 100%);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(transparent 0 31px, rgba(255,255,255,0.025) 32px),
        linear-gradient(90deg, transparent 0 31px, rgba(255,255,255,0.02) 32px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(255,255,255,0.8), transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20% -10%;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 24%, rgba(111, 198, 255, 0.18), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(255, 109, 122, 0.15), transparent 26%),
        radial-gradient(circle at 50% 92%, rgba(255, 209, 102, 0.12), transparent 28%);
      filter: blur(28px);
      animation: driftGlow 18s ease-in-out infinite alternate;
    }

    .app {
      width: min(1200px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(18, 35, 66, 0.92), rgba(7, 17, 32, 0.92)),
        radial-gradient(circle at top right, rgba(255, 209, 102, 0.24), transparent 35%);
      border: 1px solid rgba(151, 201, 255, 0.22);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -40% auto auto -8%;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 209, 102, 0.24), transparent 65%);
      animation: haloOrbit 14s linear infinite;
      opacity: 0.85;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -20% -60% 45%;
      height: 240px;
      background: radial-gradient(circle, rgba(111, 198, 255, 0.22), transparent 62%);
      transform: rotate(-12deg);
      animation: heroWave 11s ease-in-out infinite;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--warm);
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: clamp(32px, 6vw, 54px);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      max-width: 8ch;
    }

    .hero-copy {
      max-width: 680px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      margin: 0;
    }

    .ticker-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .ticker {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      backdrop-filter: blur(12px);
      overflow: hidden;
      animation: floatCard 8s ease-in-out infinite;
    }

    .ticker:nth-child(2n) {
      animation-delay: -2.4s;
    }

    .ticker:nth-child(3n) {
      animation-delay: -4.8s;
    }

    .ticker::after {
      content: "";
      position: absolute;
      inset: -1px auto -1px -40%;
      width: 38%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      transform: skewX(-18deg);
      animation: scanTicker 4.8s linear infinite;
    }

    .ticker-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .ticker-value {
      font-size: 20px;
      font-weight: 700;
    }

    .ticker-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin: 18px 0 14px;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
    }

    .tab {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(111, 198, 255, 0.22), rgba(140, 176, 255, 0.24));
      color: var(--text);
      transform: translateY(-1px);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill strong {
      color: var(--text);
    }

    .venue-panel {
      display: none;
      gap: 16px;
    }

    .venue-panel.active {
      display: grid;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .summary-card,
    .bot-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .summary-card:hover,
    .bot-card:hover {
      transform: translateY(-3px);
      border-color: rgba(151, 201, 255, 0.4);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
    }

    .summary-card {
      padding: 16px;
      min-height: 112px;
    }

    .summary-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-main {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.1;
    }

    .summary-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .board {
      display: grid;
      gap: 12px;
    }

    .bot-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
    }

    .bot-card.is-leader {
      border-color: rgba(255, 209, 102, 0.46);
      box-shadow:
        0 26px 90px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 209, 102, 0.16),
        0 0 38px rgba(255, 209, 102, 0.12);
      animation: leaderPulse 3.6s ease-in-out infinite;
    }

    .bot-card.is-shadow {
      border-color: rgba(111, 198, 255, 0.34);
    }

    .bot-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(180deg, rgba(111, 198, 255, 0.95), rgba(140, 176, 255, 0.35));
      opacity: 0.9;
    }

    .bot-card[data-sign="loss"]::before {
      background: linear-gradient(180deg, rgba(255, 109, 122, 0.95), rgba(255, 109, 122, 0.25));
    }

    .bot-top {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .bot-rank {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }

    .bot-name {
      font-family: var(--font-display);
      font-size: clamp(24px, 4vw, 30px);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .bot-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .net-pill {
      min-width: 112px;
      text-align: right;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .net-pill.good {
      color: var(--good);
    }

    .net-pill.bad {
      color: var(--bad);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    .chip.subtle {
      color: var(--muted);
    }

    .race-lane {
      position: relative;
      margin-top: 16px;
      height: 42px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(90deg, rgba(255,109,122,0.08), rgba(255,255,255,0.02) 48%, rgba(76,225,161,0.08)),
        rgba(255,255,255,0.03);
    }

    .lane-grid {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 7.5%,
          rgba(255,255,255,0.05) 7.5% 8%
        );
      opacity: 0.7;
    }

    .lane-mid {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 50%;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: translateX(-50%);
    }

    .lane-finish {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      opacity: 0.55;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.9) 0 5px,
          rgba(255,255,255,0.08) 5px 10px
        );
    }

    .lane-finish-left {
      left: 14px;
    }

    .lane-finish-right {
      right: 14px;
    }

    .lane-caption {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(236, 244, 255, 0.48);
      pointer-events: none;
    }

    .lane-caption-left {
      left: 28px;
    }

    .lane-caption-right {
      right: 28px;
    }

    .lane-runner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(111,198,255,0.82) 44%, rgba(9,19,38,0.98) 100%);
      box-shadow: 0 0 0 4px rgba(111,198,255,0.12), 0 10px 28px rgba(0,0,0,0.36);
      transform: translateX(-50%);
      transition: transform 1100ms cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 2;
    }

    .lane-runner.loss {
      background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,109,122,0.86) 46%, rgba(43,12,19,0.98) 100%);
      box-shadow: 0 0 0 4px rgba(255,109,122,0.14), 0 10px 28px rgba(0,0,0,0.36);
    }

    .lane-runner.leader {
      width: 38px;
      height: 38px;
      animation: laneLeaderPulse 2.6s ease-in-out infinite;
    }

    .runner-core {
      font-size: 17px;
      line-height: 1;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.28));
    }

    .powerbar {
      margin-top: 16px;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .powerbar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      border-radius: 999px;
      transition: width 700ms cubic-bezier(0.2, 0.8, 0.2, 1);
      background: linear-gradient(90deg, rgba(76, 225, 161, 0.92), rgba(111, 198, 255, 0.92));
    }

    .powerbar-fill.loss {
      background: linear-gradient(90deg, rgba(255, 109, 122, 0.95), rgba(255, 154, 113, 0.92));
    }

    .powerbar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-120%);
      animation: barShimmer 3.6s linear infinite;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
      margin-top: 16px;
    }

    .metric-stack {
      display: grid;
      gap: 10px;
    }

    .metric-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric-line strong {
      color: var(--text);
    }

    .form-rail {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .form-chip {
      padding: 12px 10px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .form-chip-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-chip-value {
      font-size: 18px;
      font-weight: 800;
    }

    .form-chip-value.good {
      color: var(--good);
    }

    .form-chip-value.bad {
      color: var(--bad);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    @keyframes scanTicker {
      0% { transform: translateX(0) skewX(-18deg); }
      100% { transform: translateX(420%) skewX(-18deg); }
    }

    @keyframes driftGlow {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(-2%, 2%, 0) scale(1.08); }
    }

    @keyframes heroWave {
      0%, 100% { transform: rotate(-12deg) translateY(0); }
      50% { transform: rotate(-8deg) translateY(-12px); }
    }

    @keyframes haloOrbit {
      0% { transform: rotate(0deg) translateX(0); }
      100% { transform: rotate(360deg) translateX(18px); }
    }

    @keyframes barShimmer {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(140%); }
    }

    @keyframes leaderPulse {
      0%, 100% { box-shadow: 0 26px 90px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 209, 102, 0.16), 0 0 38px rgba(255, 209, 102, 0.12); }
      50% { box-shadow: 0 26px 96px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 209, 102, 0.22), 0 0 54px rgba(255, 209, 102, 0.2); }
    }

    @keyframes laneLeaderPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.16), 0 10px 28px rgba(0,0,0,0.36); }
      50% { box-shadow: 0 0 0 7px rgba(255, 209, 102, 0.18), 0 10px 34px rgba(0,0,0,0.4); }
    }

    @media (max-width: 840px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .bot-top {
        flex-direction: column;
      }

      .net-pill {
        text-align: left;
      }
    }
  </style>
</head>

    const LIVE_STATUS = {
  "state": "running",
  "interval_minutes": 30.0,
  "last_refresh_started_at": "2026-04-11T17:44:50.107660+00:00",
  "last_refresh_finished_at": "",
  "next_refresh_at": "",
  "last_error": ""
};

    const currency = (value) => {
      const sign = value > 0 ? "+" : value < 0 ? "-" : "";
      return `${sign}$${Math.abs(value).toFixed(2)}`;
    };

    const shortStage = (stage) => (stage || "").toUpperCase().replace("STAGE", "S");

    const badgeMap = {
      KING: "Crown Holder",
      HOT: "Hot Streak",
      SHADOW: "Shadow Ready",
      FILTER: "Live Filter",
      ROPE: "On the Ropes",
      RIP: "Graveyard",
      LIVE: "Live Guard",
    };

    const parseTime = (value) => {
      if (!value) return null;
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    };

    const relative = (value) => {
      const date = parseTime(value);
      if (!date) return "";
      const delta = date.getTime() - Date.now();
      const abs = Math.abs(delta) / 1000;
      if (abs < 60) return "now";
      const label = abs < 3600 ? `${Math.round(abs / 60)}m`
        : abs < 86400 ? `${(abs / 3600).toFixed(1)}h`
        : `${(abs / 86400).toFixed(1)}d`;
      return delta >= 0 ? `in ${label}` : `${label} ago`;
    };

    const stageMix = (leaderboard) => {
      const counts = {};
      for (const row of leaderboard || []) {
        const key = shortStage(row.stage);
        if (!key) continue;
        counts[key] = (counts[key] || 0) + 1;
      }
      return Object.entries(counts).map(([stage, count]) => `${stage}:${count}`).join(" / ");
    };

    const leaderSummary = (leader) => {
      if (!leader) return "-";
      return `${leader.nickname || leader.case_id} ${currency(Number(leader.net_pnl || 0))}`;
    };

    const tickerRow = document.getElementById("ticker-row");
    const tabs = document.getElementById("tabs");
    const panels = document.getElementById("venue-panels");
    const statusPill = document.getElementById("status-pill");

    const venues = SNAPSHOT.venues || [];
    const allScores = venues.flatMap((venue) => (venue.leaderboard || []).map((row) => Math.abs(Number(row.score?.net_pnl || 0))));
    const scoreScale = Math.max(...allScores, 1);

    const tickerCards = [
      {
        label: "Age",
        value: relative(SNAPSHOT.generated_at) || "just now",
        sub: "Latest arena snapshot",
      },
      {
        label: "Cadence",
        value: `${Math.round(Number(LIVE_STATUS.interval_minutes || 0) || 0)}m`,
        sub: LIVE_STATUS.state === "running" ? "refresh running now" : "battle loop heartbeat",
      },
      {
        label: "Primary",
        value: venues[0] ? `$${Math.round(Number(venues[0].primary_account_start || 0))}` : "-",
        sub: venues[0] ? `Tracks ${(venues[0].account_starts || []).map((value) => `$${Math.round(Number(value))}`).join(" / ")}` : "",
      },
      {
        label: "Next",
        value: relative(LIVE_STATUS.next_refresh_at) || (LIVE_STATUS.state === "running" ? "running" : "waiting"),
        sub: "Auto arena refresh",
      },
    ];

    tickerRow.innerHTML = tickerCards.map((card) => `
      <article class="ticker">
        <div class="ticker-label">${card.label}</div>
        <div class="ticker-value">${card.value}</div>
        <div class="ticker-sub">${card.sub}</div>
      </article>
    `).join("");

    statusPill.innerHTML = `
      <strong>${(LIVE_STATUS.state || "ready").toUpperCase()}</strong>
      <span>${relative(LIVE_STATUS.next_refresh_at) || relative(LIVE_STATUS.last_refresh_finished_at) || "fresh now"}</span>
    `;

    const renderVenuePanel = (venueResult, isActive) => {
      const leaderboard = (venueResult.leaderboard || []).slice(0, 5);
      const promotion = venueResult.promotion_rules || {};
      const sessionLeaders = venueResult.session_leaders || {};
      const duplicateLocks = (venueResult.duplicate_rejections || []).length;

      return `
        <section class="venue-panel${isActive ? " active" : ""}" data-venue="${venueResult.venue}">
          <div class="summary-grid">
            <article class="summary-card">
              <div class="summary-title">Gate</div>
              <div class="summary-main">PF ${Number(promotion.min_profit_factor || 0).toFixed(2)}</div>
              <div class="summary-detail">
                DD ${Math.round(Number(promotion.max_drawdown_pct || 0) * 100)}%<br>
                Trades ${promotion.min_trades || 0}<br>
                ${(promotion.require_more_wins_than_losses ? "Need more wins than losses" : "Wins optional")}
              </div>
            </article>
            <article class="summary-card">
              <div class="summary-title">Race</div>
              <div class="summary-main">1d ${leaderSummary(sessionLeaders["1d"])}</div>
              <div class="summary-detail">
                3d ${leaderSummary(sessionLeaders["3d"])}<br>
                7d ${leaderSummary(sessionLeaders["7d"])}
              </div>
            </article>
            <article class="summary-card">
              <div class="summary-title">Deck</div>
              <div class="summary-main">${stageMix(venueResult.leaderboard || []) || "No stages"}</div>
              <div class="summary-detail">
                Field ${(venueResult.leaderboard || []).length} contenders<br>
                Primary $${Math.round(Number(venueResult.primary_account_start || 0))}<br>
                Locks ${duplicateLocks}
              </div>
            </article>
          </div>

          <div class="board">
            ${leaderboard.map((row) => {
              const score = row.score || {};
              const bank = Object.values(row.bankroll_scores || {})
                .sort((a, b) => Number(a.account_start || 0) - Number(b.account_start || 0))
                .map((entry) => `$${Math.round(Number(entry.account_start || 0))} ${currency(Number(entry.score?.net_pnl || 0))}`)
                .join(" / ");
              const signClass = Number(score.net_pnl || 0) >= 0 ? "good" : "bad";
              const fillClass = Number(score.net_pnl || 0) >= 0 ? "" : " loss";
              const cardClass = row.rank === 1
                ? " is-leader"
                : row.promotion_target === "shadow" || row.promotion_target === "live-filter"
                  ? " is-shadow"
                  : "";
              const barWidth = Math.max(8, Math.min(100, (Math.abs(Number(score.net_pnl || 0)) / scoreScale) * 100));
              const signedLane = Math.max(-92, Math.min(92, (Number(score.net_pnl || 0) / scoreScale) * 92));
              const sessions = row.session_scores || {};
              const badge = badgeMap[(row.arena_badge || "").replace(/[[\]]/g, "")] || row.arena_title || "Contender";
              const runnerGlyph = Number(score.net_pnl || 0) >= 0
                ? (row.rank === 1 ? "👑" : "⚡")
                : "☠";
              return `
                <article class="bot-card${cardClass}" data-sign="${Number(score.net_pnl || 0) >= 0 ? "gain" : "loss"}">
                  <div class="bot-top">
                    <div>
                      <div class="bot-rank">#${row.rank} • ${badge}</div>
                      <div class="bot-name">${row.nickname || row.case_id}</div>
                      <div class="bot-sub">${row.arena_title || "Contender"} • ${(row.case_id || "").replace(/^hl_|^dx_/, "").replace(/_/g, " ")}</div>
                    </div>
                    <div class="net-pill ${signClass}">${currency(Number(score.net_pnl || 0))}</div>
                  </div>

                  <div class="chip-row">
                    <span class="chip">${row.lifecycle_state || "active"}</span>
                    <span class="chip subtle">${shortStage(row.stage)} gate ${Math.round(Number(row.hours_to_floor || 0))}h</span>
                    <span class="chip subtle">${row.promotion_target || "hold"}</span>
                    <span class="chip subtle">${Number(score.total_trades || 0)} trades</span>
                  </div>

                  <div class="race-lane">
                    <div class="lane-grid"></div>
                    <div class="lane-mid"></div>
                    <div class="lane-finish lane-finish-left"></div>
                    <div class="lane-finish lane-finish-right"></div>
                    <div class="lane-caption lane-caption-left">risk zone</div>
                    <div class="lane-caption lane-caption-right">profit lane</div>
                    <div class="lane-runner${fillClass}${row.rank === 1 ? " leader" : ""}" data-lane="${signedLane.toFixed(1)}">
                      <span class="runner-core">${runnerGlyph}</span>
                    </div>
                  </div>

                  <div class="powerbar">
                    <div class="powerbar-fill${fillClass}" data-width="${barWidth.toFixed(1)}"></div>
                  </div>

                  <div class="grid-2">
                    <div class="metric-stack">
                      <div class="metric-line"><span>Record</span><strong>${Number(score.wins || 0)}W / ${Number(score.losses || 0)}L</strong></div>
                      <div class="metric-line"><span>Profit factor</span><strong>${Number(score.profit_factor || 0).toFixed(2)}</strong></div>
                      <div class="metric-line"><span>Drawdown</span><strong>${(Number(score.max_drawdown_pct || 0) * 100).toFixed(1)}%</strong></div>
                      <div class="metric-line"><span>Bankrolls</span><strong>${bank || "-"}</strong></div>
                    </div>
                    <div class="form-rail">
                      ${["1d", "3d", "7d"].map((windowKey) => {
                        const value = Number(sessions[windowKey]?.net_pnl || 0);
                        const klass = value >= 0 ? "good" : "bad";
                        return `
                          <div class="form-chip">
                            <div class="form-chip-label">${windowKey}</div>
                            <div class="form-chip-value ${klass}">${currency(value)}</div>
                          </div>
                        `;
                      }).join("")}
                    </div>
                  </div>
                </article>
              `;
            }).join("")}
          </div>
        </section>
      `;
    };

    tabs.innerHTML = venues.map((venue, index) => `
      <button class="tab${index === 0 ? " active" : ""}" data-venue="${venue.venue}">
        ${venue.venue} Arena
      </button>
    `).join("");

    panels.innerHTML = venues.map((venue, index) => renderVenuePanel(venue, index === 0)).join("");

    tabs.addEventListener("click", (event) => {
      const button = event.target.closest(".tab");
      if (!button) return;
      const venue = button.dataset.venue;
      for (const tab of tabs.querySelectorAll(".tab")) {
        tab.classList.toggle("active", tab === button);
      }
      for (const panel of panels.querySelectorAll(".venue-panel")) {
        panel.classList.toggle("active", panel.dataset.venue === venue);
      }
    });

    requestAnimationFrame(() => {
      for (const fill of document.querySelectorAll(".powerbar-fill")) {
        fill.style.width = `${fill.dataset.width}%`;
      }
      for (const runner of document.querySelectorAll(".lane-runner")) {
        runner.style.transform = `translateX(calc(${runner.dataset.lane}% - 50%))`;
      }
    });

    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }
  </script>
