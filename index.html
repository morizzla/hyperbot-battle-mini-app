<style>
  :root {
    --bg: #0b1020;
    --panel: #121931;
    --panel-2: #182241;
    --line: rgba(255,255,255,0.08);
    --text: #edf2ff;
    --muted: #99a6c7;
    --good: #3ddc97;
    --bad: #ff7b72;
    --warn: #f3b54a;
    --accent: #68a0ff;
    --mono: "JetBrains Mono", "Consolas", monospace;
    --sans: "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #0b1020 0%, #0f1730 100%);
    color: var(--text);
    font-family: var(--sans);
  }
  .shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px 14px 32px;
  }
  .hero {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .hero h1 {
    margin: 0 0 6px;
    font-size: 24px;
  }
  .hero p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .tab {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    border-radius: 12px;
    padding: 10px 12px;
    font-weight: 700;
  }
  .tab.active {
    background: var(--panel-2);
    color: var(--text);
    border-color: rgba(104,160,255,0.35);
  }
  .venue {
    display: none;
    gap: 12px;
    flex-direction: column;
  }
  .venue.active { display: flex; }
  .venue-head {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
  }
  .venue-head h2 {
    margin: 0 0 6px;
    font-size: 20px;
  }
  .venue-head .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 4px;
  }
  .venue-head .focus {
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
  }
  .cards {
    display: grid;
    gap: 10px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
  }
  .card.leader {
    border-color: rgba(104,160,255,0.35);
    background: linear-gradient(180deg, #182241 0%, #121931 100%);
  }
  .row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .title {
    font-size: 17px;
    font-weight: 800;
    margin: 0 0 4px;
  }
  .meta {
    color: var(--muted);
    font-size: 12px;
  }
  .pnl {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    white-space: nowrap;
  }
  .pnl.good { color: var(--good); }
  .pnl.bad { color: var(--bad); }
  .grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .metric {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 8px;
  }
  .metric .k {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .metric .v {
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
  }
  .line {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .line strong { color: var(--text); }
  @media (max-width: 680px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>

    function fmtMoney(value) {
      const sign = value >= 0 ? '+' : '-';
      return sign + '$' + Math.abs(value).toFixed(2);
    }
    function fmtPct(value) {
      return (value * 100).toFixed(1) + '%';
    }
    function cls(value) {
      return value >= 0 ? 'good' : 'bad';
    }
    function esc(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }
    function rowStatus(row) {
      if (row.lifecycle_state === 'knocked_out') return 'out';
      return esc(row.lifecycle_state || 'active') + ' | ' + esc(row.stage_gate_label || '');
    }
    function renderCard(row, leader) {
      const score = row.score || {};
      const session = row.session_scores || {};
      return [
        '<article class="card ' + (leader ? 'leader' : '') + '">',
        '<div class="row">',
        '<div>',
        '<div class="title">' + esc(row.nickname || row.case_id) + '</div>',
        '<div class="meta">' + esc(row.base_strategy || 'strategy') + ' | ' + esc(row.lifecycle_state || 'active') + ' | ' + esc(row.stage_gate_label || '') + '</div>',
        '</div>',
        '<div class="pnl ' + cls(score.net_pnl || 0) + '">' + fmtMoney(score.net_pnl || 0) + '</div>',
        '</div>',
        '<div class="grid">',
        '<div class="metric"><div class="k">PF</div><div class="v">' + (score.profit_factor || 0).toFixed(2) + '</div></div>',
        '<div class="metric"><div class="k">DD</div><div class="v">' + fmtPct(score.max_drawdown_pct || 0) + '</div></div>',
        '<div class="metric"><div class="k">W/L</div><div class="v">' + (score.wins || 0) + '/' + (score.losses || 0) + '</div></div>',
        '<div class="metric"><div class="k">Trades</div><div class="v">' + (score.total_trades || 0) + '</div></div>',
        '</div>',
        '<div class="line"><strong>Form</strong> 1d ' + fmtMoney((session['1d'] || {}).net_pnl || 0) + ' | 3d ' + fmtMoney((session['3d'] || {}).net_pnl || 0) + ' | 7d ' + fmtMoney((session['7d'] || {}).net_pnl || 0) + '</div>',
        '</article>',
      ].join('');
    }
    function renderVenue(venue, active) {
      const rows = venue.rows || [];
      return [
        '<section class="venue ' + (active ? 'active' : '') + '" id="venue-' + venue.venue + '">',
        '<div class="venue-head">',
        '<h2>' + esc(venue.venue) + ' // ' + venue.days + 'd</h2>',
        '<div class="sub">' + esc(venue.focus_label) + '</div>',
        '<div class="focus">' + esc(venue.strategy_summary) + '</div>',
        '</div>',
        '<div class="cards">' + rows.map((row, index) => renderCard(row, index === 0)).join('') + '</div>',
        '</section>',
      ].join('');
    }
    function activateVenue(name) {
      document.querySelectorAll('.tab').forEach((button) => {
        button.classList.toggle('active', button.dataset.venue === name);
      });
      document.querySelectorAll('.venue').forEach((section) => {
        section.classList.toggle('active', section.id === 'venue-' + name);
      });
    }
    const tabs = document.getElementById('tabs');
    const venues = document.getElementById('venues');
    const venueList = VIEW.venues || [];
    tabs.innerHTML = venueList.map((venue, index) =>
      '<button class="tab ' + (index === 0 ? 'active' : '') + '" data-venue="' + venue.venue + '">' +
      venue.venue +
      '</button>'
    ).join('');
    venues.innerHTML = venueList.map((venue, index) => renderVenue(venue, index === 0)).join('');
    tabs.querySelectorAll('.tab').forEach((button) => {
      button.addEventListener('click', () => activateVenue(button.dataset.venue));
    });
  </script>
