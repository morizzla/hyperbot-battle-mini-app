  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #080b12;
    --card: rgba(14,18,30,0.95);
    --border: rgba(255,255,255,0.05);
    --text: #e8edf8;
    --muted: #5d6f88;
    --green: #34d399;
    --green-g: rgba(52,211,153,0.15);
    --red: #f87171;
    --red-g: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-g: rgba(251,191,36,0.1);
    --cyan: #22d3ee;
    --font: "Outfit", sans-serif;
    --mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); min-height: 100vh;
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
  }

  .venue-swiper {
    display: flex; width: 200vw;
    transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .venue-swiper.show-dx { transform: translateX(-100vw); }

  .venue-page {
    width: 100vw; min-height: 100vh;
    padding: 12px 14px 32px; flex-shrink: 0;
  }

  .venue-toggle {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; height: 52px;
    background: rgba(8,11,18,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .vt-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 8px; border: none; background: none;
    font-family: var(--font); font-size: 14px; font-weight: 700;
    color: var(--muted); cursor: pointer; transition: all 200ms;
    position: relative;
  }

  .vt-btn.active { color: var(--text); }

  .vt-btn::after {
    content: ""; position: absolute;
    bottom: 0; left: 20%; right: 20%; height: 3px;
    border-radius: 3px 3px 0 0;
    background: transparent; transition: background 200ms;
  }

  .vt-btn.hl.active::after { background: var(--green); box-shadow: 0 0 12px var(--green-g); }
  .vt-btn.dx.active::after { background: var(--red); box-shadow: 0 0 12px var(--red-g); }

  .vt-pnl { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .vt-pnl.good { color: var(--green); }
  .vt-pnl.bad { color: var(--red); }

  .spacer { height: 60px; }

  .money-stream {
    position: relative; height: 80px;
    border-radius: 16px; overflow: hidden;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
  }

  .stream-canvas { position: absolute; inset: 0; }

  .neon-line {
    position: absolute; height: 2px;
    border-radius: 1px; opacity: 0; filter: blur(0.5px);
  }

  .neon-line.gain {
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    box-shadow: 0 0 8px var(--green-g), 0 0 20px var(--green-g);
    animation: neonFlowRight 3s ease-in-out infinite;
  }

  .neon-line.gain:nth-child(1) { top: 15%; width: 40%; animation-delay: 0s; }
  .neon-line.gain:nth-child(2) { top: 35%; width: 55%; animation-delay: 0.6s; }
  .neon-line.gain:nth-child(3) { top: 55%; width: 35%; animation-delay: 1.2s; }
  .neon-line.gain:nth-child(4) { top: 75%; width: 48%; animation-delay: 1.8s; }
  .neon-line.gain:nth-child(5) { top: 25%; width: 30%; animation-delay: 2.4s; }
  .neon-line.gain:nth-child(6) { top: 65%; width: 42%; animation-delay: 0.3s; }

  .neon-line.loss {
    background: linear-gradient(270deg, transparent, var(--red), transparent);
    box-shadow: 0 0 8px var(--red-g), 0 0 20px var(--red-g);
    animation: neonFlowLeft 2.5s ease-in-out infinite;
  }

  .neon-line.loss:nth-child(1) { top: 12%; width: 45%; animation-delay: 0s; }
  .neon-line.loss:nth-child(2) { top: 30%; width: 38%; animation-delay: 0.5s; }
  .neon-line.loss:nth-child(3) { top: 48%; width: 52%; animation-delay: 1.0s; }
  .neon-line.loss:nth-child(4) { top: 66%; width: 34%; animation-delay: 1.5s; }
  .neon-line.loss:nth-child(5) { top: 82%; width: 46%; animation-delay: 2.0s; }
  .neon-line.loss:nth-child(6) { top: 40%; width: 40%; animation-delay: 0.8s; }

  .neon-orb {
    position: absolute; width: 6px; height: 6px;
    border-radius: 50%; opacity: 0;
  }

  .neon-orb.gain {
    background: var(--green);
    box-shadow: 0 0 10px var(--green), 0 0 24px var(--green-g);
    animation: orbRight 2.5s ease-in-out infinite;
  }

  .neon-orb.loss {
    background: var(--red);
    box-shadow: 0 0 10px var(--red), 0 0 24px var(--red-g);
    animation: orbLeft 2s ease-in-out infinite;
  }

  .neon-orb:nth-child(7) { top: 18%; animation-delay: 0.2s; }
  .neon-orb:nth-child(8) { top: 42%; animation-delay: 0.8s; }
  .neon-orb:nth-child(9) { top: 68%; animation-delay: 1.4s; }

  .stream-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono); font-size: 32px;
    font-weight: 700; z-index: 2; letter-spacing: -0.03em;
  }

  .stream-label.good { color: var(--green); text-shadow: 0 0 40px var(--green-g); }
  .stream-label.bad { color: var(--red); text-shadow: 0 0 40px var(--red-g); }

  .stream-sub {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; color: var(--muted); z-index: 2; white-space: nowrap;
  }

  .bot-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 10px;
    position: relative; overflow: hidden;
    animation: fadeUp 400ms ease-out both;
  }

  .bot-card:nth-child(2) { animation-delay: 60ms; }
  .bot-card:nth-child(3) { animation-delay: 120ms; }
  .bot-card:nth-child(4) { animation-delay: 180ms; }
  .bot-card:nth-child(5) { animation-delay: 240ms; }

  .bot-card.leader { border-color: rgba(251,191,36,0.2); }

  .bot-card::before {
    content: ""; position: absolute;
    top: 12px; bottom: 12px; left: 0; width: 3px;
    border-radius: 0 3px 3px 0;
  }

  .bot-card.positive::before { background: var(--green); box-shadow: 0 0 8px var(--green-g); }
  .bot-card.negative::before { background: var(--red); box-shadow: 0 0 8px var(--red-g); }
  .bot-card.dead { opacity: 0.4; }

  .bot-head {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 12px;
  }

  .bot-name { font-size: 17px; font-weight: 800; line-height: 1.2; }
  .bot-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .bot-pnl { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .bot-pnl.good { color: var(--green); }
  .bot-pnl.bad { color: var(--red); }

  .stats-bar {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 6px; margin-bottom: 12px;
  }

  .sb-item {
    text-align: center; padding: 8px 4px;
    border-radius: 8px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.03);
  }

  .sb-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }

  .sb-val { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .sb-val.good { color: var(--green); }
  .sb-val.bad { color: var(--red); }
  .sb-val.amber { color: var(--amber); }

  .stats-bar-2 {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; margin-bottom: 14px;
  }

  .ops-strip {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; margin: 10px 0 12px;
  }

  .ops-card {
    padding: 10px 12px; border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .ops-title {
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }

  .ops-value {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    color: var(--text); line-height: 1.35;
  }

  .ops-value.good { color: var(--green); }
  .ops-value.bad { color: var(--red); }
  .ops-value.amber { color: var(--amber); }

  .gate-timeline { position: relative; padding: 8px 0 4px; }

  .gate-track {
    display: flex; align-items: center;
    height: 32px; position: relative;
  }

  .gate-rail {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 4px; transform: translateY(-50%);
    border-radius: 2px; background: rgba(255,255,255,0.06);
  }

  .gate-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    border-radius: 2px;
    transition: width 800ms cubic-bezier(0.2,0.8,0.2,1);
  }

  .gate-fill.good { background: linear-gradient(90deg, var(--green), rgba(52,211,153,0.4)); }
  .gate-fill.bad { background: linear-gradient(90deg, var(--red), rgba(248,113,113,0.3)); }
  .gate-fill.amber { background: linear-gradient(90deg, var(--amber), rgba(251,191,36,0.3)); }

  .gate-node {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 9px; font-weight: 800; z-index: 2; border: 2px solid;
  }

  .gate-node.passed {
    background: var(--green-g); border-color: var(--green); color: var(--green);
  }

  .gate-node.current {
    border-color: var(--amber); background: var(--amber-g); color: var(--amber);
    animation: gatePulse 2s ease-in-out infinite;
  }

  .gate-node.locked {
    border-color: rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03); color: var(--muted);
  }

  .gate-node.failed {
    border-color: var(--red); background: var(--red-g); color: var(--red);
  }

  .gate-labels {
    display: flex; justify-content: space-between; margin-top: 6px;
  }

  .gate-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); text-align: center; width: 60px;
  }

  .gate-label.active { color: var(--amber); }
  .gate-label.fail { color: var(--red); }

  .gate-eta {
    text-align: center; font-size: 11px;
    color: var(--muted); margin-top: 4px;
  }

  .gate-eta strong { color: var(--amber); font-weight: 700; }
  .gate-eta .fail { color: var(--red); }

  .timestamp {
    text-align: center; font-size: 11px;
    color: var(--muted); margin-top: 16px; padding-bottom: 24px;
  }

  .live-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--green);
    margin-right: 6px; animation: livePulse 2s ease-in-out infinite;
  }

  @keyframes neonFlowRight {
    0% { left: -50%; opacity: 0; }
    15% { opacity: 0.8; }
    85% { opacity: 0.6; }
    100% { left: 110%; opacity: 0; }
  }

  @keyframes neonFlowLeft {
    0% { right: -50%; opacity: 0; }
    15% { opacity: 0.7; }
    85% { opacity: 0.5; }
    100% { right: 110%; opacity: 0; }
  }

  @keyframes orbRight {
    0% { left: -5%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { left: 105%; opacity: 0; }
  }

  @keyframes orbLeft {
    0% { right: -5%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.7; }
    100% { right: 105%; opacity: 0; }
  }

  @keyframes gatePulse {
    0%, 100% { box-shadow: 0 0 0 rgba(251,191,36,0); }
    50% { box-shadow: 0 0 12px rgba(251,191,36,0.3); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  @keyframes livePulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
</style>

    function fmt(n) { return (n >= 0 ? '+' : '') + '$' + Math.abs(n).toFixed(2); }
    function fmtShort(n) { return (n >= 0 ? '+' : '-') + '$' + Math.abs(n).toFixed(0); }
    function pct(n) { return (n * 100).toFixed(1) + '%'; }
    function cls(n) { return n >= 0 ? 'good' : 'bad'; }
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function neonStream(type) {
      var c = type === 'gain' ? 'gain' : 'loss';
      return '<div class="money-stream"><div class="stream-canvas">' +
        Array(6).fill(0).map(function() { return '<div class="neon-line ' + c + '"></div>'; }).join('') +
        Array(3).fill(0).map(function() { return '<div class="neon-orb ' + c + '"></div>'; }).join('') +
        '</div><div class="stream-label ' + cls(type === 'gain' ? 1 : -1) + '" id="stream-pnl-' + c + '"></div>' +
        '<div class="stream-sub" id="stream-sub-' + c + '"></div></div>';
    }

    function stageIndex(stage) {
      if (stage === 'stage1') return 0;
      if (stage === 'stage2') return 1;
      if (stage === 'stage3') return 2;
      return 3;
    }

    function gateTimeline(bot) {
      var s = bot.score || {};
      var si = stageIndex(bot.stage);
      var ko = bot.lifecycle_state === 'knocked_out';
      var champ = bot.verdict === 'champion';
      var allPass = champ && bot.promotion_pass;

      var nodes = ['S1', 'S2', 'S3', 'OK'];
      var hours = ['24h', '72h', '168h', 'Live'];
      var fillPct, fillCls;

      if (ko) {
        fillPct = Math.min(100, ((si + 0.3) / 4) * 100);
        fillCls = 'bad';
      } else if (allPass) {
        fillPct = 100;
        fillCls = 'good';
      } else {
        var prog = bot.hours_to_floor !== undefined
          ? Math.max(0, 1 - bot.hours_to_floor / Math.max(1, bot.stage_floor_hours))
          : 0.5;
        fillPct = ((si + prog) / 4) * 100;
        fillCls = 'amber';
      }

      var nodeHtml = nodes.map(function(label, i) {
        var pos = (i / 3) * 100;
        var nodeCls;
        if (ko) {
          nodeCls = i <= si ? 'failed' : 'locked';
        } else if (allPass) {
          nodeCls = 'passed';
        } else if (i < si) {
          nodeCls = 'passed';
        } else if (i === si) {
          nodeCls = 'current';
        } else {
          nodeCls = 'locked';
        }
        var txt = (ko && i <= si) ? 'X' : label;
        return '<div class="gate-node ' + nodeCls + '" style="left:' + pos + '%">' + txt + '</div>';
      }).join('');

      var labelHtml = hours.map(function(h, i) {
        var lc = '';
        if (ko && i <= si) lc = ' fail';
        else if (!ko && !allPass && i === si) lc = ' active';
        return '<div class="gate-label' + lc + '">' + (ko && i <= si ? 'Failed' : h) + '</div>';
      }).join('');

      var eta = '';
      if (ko) {
        var reasons = [];
        var promo = (SNAPSHOT.venues || []).find(function(v) {
          return v.leaderboard && v.leaderboard.some(function(b) { return b.case_id === bot.case_id; });
        });
        var rules = promo ? promo.promotion_rules : {};
        if (s.net_pnl < (rules.min_net_pnl || 0)) reasons.push('Net PnL negative');
        if ((s.profit_factor || 0) < (rules.min_profit_factor || 1.05)) reasons.push('PF below ' + (rules.min_profit_factor || 1.05));
        if ((s.max_drawdown_pct || 0) > (rules.max_drawdown_pct || 0.12)) reasons.push('DD above ' + pct(rules.max_drawdown_pct || 0.12));
        eta = '<span class="fail">Knocked out' + (reasons.length ? ' -- ' + esc(reasons.join(', ')) : '') + '</span>';
      } else if (allPass) {
        eta = 'All gates cleared -- <strong>Champion</strong>';
      } else {
        var h = bot.hours_to_floor;
        var hStr = h !== undefined ? Math.ceil(h) + 'h' : '?';
        eta = esc(bot.stage_label || '') + ' gate in <strong>' + hStr + '</strong>';
      }

      return '<div class="gate-timeline"><div class="gate-track"><div class="gate-rail">' +
        '<div class="gate-fill ' + fillCls + '" style="width:' + fillPct.toFixed(0) + '%"></div></div>' +
        nodeHtml + '</div><div class="gate-labels">' + labelHtml +
        '</div><div class="gate-eta">' + eta + '</div></div>';
    }

    function botCard(bot, isLeader) {
      var s = bot.score || {};
      var ko = bot.lifecycle_state === 'knocked_out';
      var pos = (s.net_pnl || 0) >= 0;
      var cardCls = 'bot-card';
      if (isLeader) cardCls += ' leader';
      cardCls += pos ? ' positive' : ' negative';
      if (ko) cardCls += ' dead';

      var cov = bot.coverage || {};
      var owned = (cov.owned_assets || []).join(' ') || '-';
      var ownedRatio = (cov.owned_assets || []).length + '/' + (cov.requested_assets || []).length;

      var bs = bot.bankroll_scores || {};
      var bk150 = bs['150'] ? bs['150'].score.net_pnl : null;
      var bk500 = bs['500'] ? bs['500'].score.net_pnl : null;

      var ss = bot.session_scores || {};
      var d1 = ss['1d'] ? ss['1d'].net_pnl : null;
      var d7 = ss['7d'] ? ss['7d'].net_pnl : null;

      var roleLabel = bot.verdict === 'champion' ? 'Champion' : (ko ? 'Knocked out' : 'Challenger');

      return '<div class="' + cardCls + '">' +
        '<div class="bot-head"><div>' +
        '<div class="bot-name">' + esc(bot.nickname || bot.case_id) + '</div>' +
        '<div class="bot-sub">' + esc(bot.base_strategy || '') + ' -- ' + roleLabel + '</div>' +
        '</div><div class="bot-pnl ' + cls(s.net_pnl || 0) + '">' + fmt(s.net_pnl || 0) + '</div></div>' +
        '<div class="stats-bar">' +
        '<div class="sb-item"><div class="sb-label">PF</div><div class="sb-val ' +
          ((s.profit_factor || 0) >= 1.05 ? 'good' : (s.profit_factor || 0) < 1 ? 'bad' : '') +
          '">' + (s.profit_factor ? s.profit_factor.toFixed(2) : '-') + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">DD</div><div class="sb-val ' +
          ((s.max_drawdown_pct || 0) > 0.12 ? 'bad' : (s.max_drawdown_pct || 0) > 0.08 ? 'amber' : '') +
          '">' + pct(s.max_drawdown_pct || 0) + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">W/L</div><div class="sb-val ' +
          ((s.wins || 0) > (s.losses || 0) ? 'good' : 'bad') +
          '">' + (s.wins || 0) + '/' + (s.losses || 0) + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">1D</div><div class="sb-val ' +
          (d1 !== null ? cls(d1) : '') + '">' + (d1 !== null ? fmt(d1) : '-') + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">7D</div><div class="sb-val ' +
          (d7 !== null ? cls(d7) : '') + '">' + (d7 !== null ? fmt(d7) : '-') + '</div></div>' +
        '</div>' +
        '<div class="stats-bar-2">' +
        '<div class="sb-item"><div class="sb-label">$150</div><div class="sb-val ' +
          (bk150 !== null ? cls(bk150) : '') + '">' + (bk150 !== null ? fmtShort(bk150) : '-') + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">$500</div><div class="sb-val ' +
          (bk500 !== null ? cls(bk500) : '') + '">' + (bk500 !== null ? fmtShort(bk500) : '-') + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">Owned</div><div class="sb-val">' + esc(ownedRatio) + '</div></div>' +
        '<div class="sb-item"><div class="sb-label">Assets</div><div class="sb-val">' + esc(owned) + '</div></div>' +
        '</div>' +
        gateTimeline(bot) +
        '</div>';
    }

    function reserveStateLabel(state) {
      if (state === 'ready') return 'Reserve ready';
      if (state === 'active') return 'Reserve active';
      if (state === 'seeded') return 'Reserve seeded';
      if (state === 'field-full') return 'Reserve dormant';
      if (state === 'exhausted') return 'Reserve exhausted';
      return 'Reserve off';
    }

    function renderOpsStrip(venue) {
      var rotation = venue.rotation_status || {};
      var reserve = venue.replenishment_status || {};
      if (!rotation.enabled && !reserve.enabled) return '';

      var rotValue = 'off';
      var rotCls = '';
      if (rotation.enabled) {
        var activeCases = rotation.active_agent_cases || 0;
        var maxCases = rotation.max_agent_cases || 0;
        var freeSlots = rotation.free_agent_slots || 0;
        var activeGroups = rotation.active_group_count || 0;
        var requestedGroups = rotation.requested_group_count || 0;
        var benchedCases = rotation.benched_case_count || 0;
        rotValue = activeCases + '/' + maxCases + ' slots · free ' + freeSlots +
          '<br>' + activeGroups + '/' + requestedGroups + ' groups' +
          (benchedCases ? ' · benched ' + benchedCases : '');
        rotCls = freeSlots > 0 ? 'amber' : '';
      }

      var reserveValue = 'off';
      var reserveCls = '';
      if (reserve.enabled) {
        reserveValue = reserveStateLabel(reserve.state || 'none') +
          '<br>queue ' + (reserve.queue_size || 0) +
          ((reserve.seeded_count || 0) ? ' · seeded ' + reserve.seeded_count : '');
        if (reserve.next_label) {
          reserveValue += ' · next ' + esc(reserve.next_label);
        } else if (reserve.next_group) {
          reserveValue += ' · next ' + esc(String(reserve.next_group).split('_').join(' '));
        }
        if (reserve.state === 'ready') reserveCls = 'good';
        else if (reserve.state === 'field-full') reserveCls = 'amber';
        else if (reserve.state === 'exhausted') reserveCls = 'bad';
      }

      return '<div class="ops-strip">' +
        '<div class="ops-card"><div class="ops-title">Rotation</div><div class="ops-value ' + rotCls + '">' + rotValue + '</div></div>' +
        '<div class="ops-card"><div class="ops-title">Reserve</div><div class="ops-value ' + reserveCls + '">' + reserveValue + '</div></div>' +
        '</div>';
    }

    function renderVenue(venue, pageId) {
      var page = document.getElementById(pageId);
      var lb = venue.leaderboard || [];
      if (!lb.length) return;

      var champ = lb[0];
      var champScore = champ.score || {};
      var isGain = (champScore.net_pnl || 0) >= 0;
      var streamType = isGain ? 'gain' : 'loss';

      var html = neonStream(streamType);
      html += renderOpsStrip(venue);

      lb.forEach(function(bot, i) {
        html += botCard(bot, i === 0);
      });

      var ts = venue.generated_at || SNAPSHOT.generated_at || '';
      html += '<div class="timestamp"><span class="live-dot"></span>' +
        esc(venue.venue) + ' -- ' + venue.days + 'd window -- ' +
        esc(ts.substring(0, 16).replace('T', ' ')) + ' UTC</div>';

      page.innerHTML = '<div class="spacer"></div>' + html;

      var pnlEl = page.querySelector('.stream-label');
      if (pnlEl) pnlEl.textContent = fmt(champScore.net_pnl || 0);

      var subEl = page.querySelector('.stream-sub');
      if (subEl) {
        subEl.textContent = 'PF ' + (champScore.profit_factor ? champScore.profit_factor.toFixed(2) : '-') +
          ' \u00b7 ' + (champScore.total_trades || 0) + ' trades' +
          ' \u00b7 ' + pct(champScore.win_rate || 0) + ' WR' +
          ' \u00b7 ' + pct(champScore.max_drawdown_pct || 0) + ' DD';
      }
    }

    function render() {
      var venues = SNAPSHOT.venues || [];
      var hlVenue = venues.find(function(v) { return v.venue === 'HL'; });
      var dxVenue = venues.find(function(v) { return v.venue === 'DX'; });

      if (hlVenue) {
        renderVenue(hlVenue, 'hl-page');
        var hlChamp = (hlVenue.leaderboard || [])[0];
        var hlPnl = hlChamp ? (hlChamp.score || {}).net_pnl || 0 : 0;
        var hlTab = document.getElementById('hl-tab-pnl');
        hlTab.textContent = fmt(hlPnl);
        hlTab.className = 'vt-pnl ' + cls(hlPnl);
      }

      if (dxVenue) {
        renderVenue(dxVenue, 'dx-page');
        var dxChamp = (dxVenue.leaderboard || [])[0];
        var dxPnl = dxChamp ? (dxChamp.score || {}).net_pnl || 0 : 0;
        var dxTab = document.getElementById('dx-tab-pnl');
        dxTab.textContent = fmt(dxPnl);
        dxTab.className = 'vt-pnl ' + cls(dxPnl);
      }
    }

    function showVenue(v) {
      var swiper = document.getElementById('swiper');
      swiper.classList.toggle('show-dx', v === 'dx');
      document.querySelectorAll('.vt-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.vt-btn.' + v).classList.add('active');
    }

    var startX = 0;
    document.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
    document.addEventListener('touchend', function(e) {
      var diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 60) showVenue(diff > 0 ? 'dx' : 'hl');
