<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Battle Pulse Arena</title>
<style>
  :root {
    --bg: #091015;
    --panel: #101920;
    --panel-2: #15222b;
    --panel-3: #0d1419;
    --line: rgba(255,255,255,0.08);
    --text: #edf7f1;
    --muted: #96a9a0;
    --mint: #7ff0be;
    --sky: #86d7ff;
    --amber: #ffd36b;
    --coral: #ff8e7f;
    --violet: #b8adff;
    --mono: "JetBrains Mono", "Consolas", monospace;
    --sans: "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at top left, rgba(127,240,190,0.10), transparent 22%),
      radial-gradient(circle at top right, rgba(134,215,255,0.08), transparent 28%),
      linear-gradient(180deg, #091015 0%, #10181d 100%);
    color: var(--text);
    font-family: var(--sans);
  }
  .shell {
    max-width: 1120px;
    margin: 0 auto;
    padding: 18px 14px 36px;
  }
  .hero {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent), var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .hero h1 {
    margin: 0 0 8px;
    font-size: 28px;
    letter-spacing: -0.03em;
  }
  .hero p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 14px;
  }
  .stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat .v {
    display: block;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 800;
  }
  .stat .k {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.10em;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .tab {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    border-radius: 12px;
    padding: 10px 12px;
    font-weight: 700;
  }
  .tab.active {
    background: var(--panel-2);
    color: var(--text);
    border-color: rgba(127,240,190,0.28);
  }
  .venue {
    display: none;
    gap: 12px;
    flex-direction: column;
  }
  .venue.active { display: flex; }
  .venue-head {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: 12px;
  }
  .head-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  .head-card h2, .head-card h3 {
    margin: 0 0 6px;
  }
  .head-sub {
    color: var(--muted);
    font-size: 13px;
  }
  .champ {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.10);
    font-size: 14px;
  }
  .champ strong {
    font-size: 17px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  .section h3 {
    margin: 0 0 10px;
    font-size: 15px;
    letter-spacing: 0.01em;
  }
  .stack {
    display: grid;
    gap: 10px;
  }
  .card {
    background: var(--panel-3);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .title {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 800;
  }
  .meta {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }
  .chip {
    border-radius: 999px;
    padding: 5px 8px;
    font-size: 10px;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .chip.review { color: #fff4c8; background: rgba(255,211,107,0.14); border-color: rgba(255,211,107,0.24); }
  .chip.new { color: #d6fff0; background: rgba(127,240,190,0.14); border-color: rgba(127,240,190,0.24); }
  .chip.progressing { color: #daf3ff; background: rgba(134,215,255,0.14); border-color: rgba(134,215,255,0.24); }
  .chip.stalled { color: #ffd9d3; background: rgba(255,142,127,0.14); border-color: rgba(255,142,127,0.24); }
  .chip.out { color: #e0d9ff; background: rgba(184,173,255,0.14); border-color: rgba(184,173,255,0.24); }
  .empty {
    color: var(--muted);
    font-size: 13px;
  }
  @media (max-width: 860px) {
    .venue-head,
    .grid,
    .summary {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>Battle Pulse Arena</h1>

      <div class="summary" id="summary"></div>
    </section>
    <div class="tabs" id="tabs"></div>
    <div id="venues"></div>
  </div>
  <script>

    function esc(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }
    function fmtMoney(value) {
      const sign = value >= 0 ? '+' : '-';
      return sign + '$' + Math.abs(value).toFixed(2);
    }
    function summaryEntries(summary) {
      return String(summary || '')
        .split('|')
        .map((part) => part.trim())
        .filter(Boolean)
        .map((part) => {
          const bits = part.split(' ');
          return { label: bits[0] || '', value: bits.slice(1).join(' ') || '0' };
        });
    }
    function renderSummary() {
      const root = document.getElementById('summary');
      root.innerHTML = summaryEntries(VIEW.summary).map((item) =>
        '<div class="stat"><span class="v">' + esc(item.value) + '</span><span class="k">' + esc(item.label) + '</span></div>'
      ).join('');
    }
    function sectionTitle(key) {
      return {
        review: 'Review Queue',
        new: 'New Challengers',
        progressing: 'Progressing',
        stalled: 'Stalled',
        out: 'Out'
      }[key] || key;
    }
    function renderCard(row, kind) {
      return [
        '<article class="card">',
        '<div class="row">',
        '<div>',
        '<div class="title">' + esc(row.name) + ' [' + esc(row.stage) + ']</div>',
        '<div class="meta">' + esc(row.strategy) + '</div>',
        '</div>',
        '<span class="chip ' + esc(kind) + '">' + esc(sectionTitle(kind)) + '</span>',
        '</div>',
        '<div class="meta">' + esc(row.summary) + '</div>',
        '</article>',
      ].join('');
    }
    function renderSection(key, rows) {
      return [
        '<section class="section">',
        '<h3>' + esc(sectionTitle(key)) + '</h3>',
        rows.length
          ? '<div class="stack">' + rows.map((row) => renderCard(row, key)).join('') + '</div>'
          : '<div class="empty">Nothing here right now.</div>',
        '</section>',
      ].join('');
    }
    function renderVenue(venue, active) {
      const champ = venue.champion;
      const sections = venue.sections || {};
      return [
        '<section class="venue ' + (active ? 'active' : '') + '" id="venue-' + venue.venue + '">',
        '<div class="venue-head">',
        '<div class="head-card">',
        '<h2>' + esc(venue.venue) + ' // ' + esc(String(venue.days)) + 'd</h2>',
        '<div class="head-sub">Daily progress read, not raw leaderboard noise.</div>',
        champ ? (
          '<div class="champ"><div class="head-sub">Champion</div><strong>' + esc(champ.name) + ' [' + esc(champ.stage) + ']</strong><div class="head-sub">' + esc(champ.strategy) + ' | ' + fmtMoney(champ.net_pnl || 0) + '</div></div>'
        ) : '<div class="champ head-sub">No champion available.</div>',
        '</div>',
        '<div class="head-card">',
        '<h3>How to read this</h3>',
        '<div class="head-sub">Review Queue means stage 2/3 contenders to watch now. New Challengers are fresh stage 1 entries. Stalled means alive but not advancing.</div>',
        '</div>',
        '</div>',
        '<div class="grid">',
        renderSection('review', sections.review || []),
        renderSection('new', sections.new || []),
        renderSection('progressing', sections.progressing || []),
        renderSection('stalled', sections.stalled || []),
        '</div>',
        renderSection('out', sections.out || []),
        '</section>',
      ].join('');
    }
    function activateVenue(name) {
      document.querySelectorAll('.tab').forEach((button) => {
        button.classList.toggle('active', button.dataset.venue === name);
      });
      document.querySelectorAll('.venue').forEach((section) => {
        section.classList.toggle('active', section.id === 'venue-' + name);
      });
    }
    renderSummary();
    const tabs = document.getElementById('tabs');
    const venues = document.getElementById('venues');
    const venueList = VIEW.venues || [];
    tabs.innerHTML = venueList.map((venue, index) =>
      '<button class="tab ' + (index === 0 ? 'active' : '') + '" data-venue="' + venue.venue + '">' +
      esc(venue.venue) +
      '</button>'
    ).join('');
    venues.innerHTML = venueList.map((venue, index) => renderVenue(venue, index === 0)).join('');
    tabs.querySelectorAll('.tab').forEach((button) => {
      button.addEventListener('click', () => activateVenue(button.dataset.venue));
    });
  </script>
</body>
</html>
